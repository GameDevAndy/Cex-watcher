name: CeX Watcher

on:
  schedule:
    - cron: "7,27,47 9-18 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest changes
        run: |
          git pull origin "${GITHUB_REF_NAME}" --rebase || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Ensure state file exists
        run: |
          test -f state.json || echo "{}" > state.json

      - name: Run watcher
        run: python watcher.py
        timeout-minutes: 4
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Update CeX watcher state"
          git push origin "${GITHUB_REF_NAME}"

      - name: Upload debug screenshot
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-screenshot
          path: debug.png
          if-no-files-found: ignore
